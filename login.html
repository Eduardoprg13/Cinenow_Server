<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineNow — Iniciar Sesión</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <a href="index.html" style="text-decoration:none"><h1 class="logo">🎬 CineNow</h1></a>
  <nav><ul>
    <li><a href="index.html">Principal</a></li>
    <li><a href="cartelera.html">Cartelera</a></li>
    <li><a href="regiones.html">Regiones</a></li>
    <li><a href="contacto.html">Contacto</a></li>
  </ul></nav>
</header>

<section class="hero hero-xs">
  <div class="hero-content">
    <h2>Iniciar Sesión</h2>
    <p>Accede para dejar reseñas y más.</p>
  </div>
</section>

<div class="auth-container">
  <h2>🎬 Acceso</h2>
  <div class="error-msg" id="errorMsg"></div>
  <div class="form-group">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="tu@email.com">
  </div>
  <div class="form-group">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button class="auth-btn" onclick="iniciarSesion()">Iniciar Sesión</button>
  <div class="auth-links" style="margin-top:16px">
    ¿No tienes cuenta? <a href="register.html">Regístrate aquí</a>
  </div>
  <div style="margin-top:18px;background:#1a1a1a;border-radius:8px;padding:14px;font-size:.8em;color:#888;">
    
    
  </div>
</div>

<footer>🎬 2026 CineNow.</footer>
<script src="js/db.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await DB.init();
  await actualizarNav();
  if (DB.isLoggedIn()) window.location.href = 'index.html';
  document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') iniciarSesion(); });
});

async function iniciarSesion() {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  const err = document.getElementById('errorMsg');
  if (!email || !pass) { err.textContent = 'Completa todos los campos.'; err.style.display = 'block'; return; }
  try {
    const u = await DB.loginUsuario(email, pass);
    toast('¡Bienvenido, ' + u.nombre.split(' ')[0] + '!');
    setTimeout(() => window.location.href = u.rol === 'admin' ? 'admin.html' : 'index.html', 700);
  } catch (e) {
    err.textContent = e.message || 'Correo o contraseña incorrectos.';
    err.style.display = 'block';
  }
}
</script>
</body>
</html>
