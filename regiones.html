<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CineNow — Regiones</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<header>
  <a href="index.html" style="text-decoration:none"><h1 class="logo">🎬 CineNow</h1></a>
  <nav><ul>
    <li><a href="index.html">Principal</a></li>
    <li><a href="cartelera.html">Cartelera</a></li>
    <li><a href="regiones.html">Regiones</a></li>
    <li><a href="contacto.html">Contacto</a></li>
  </ul></nav>
</header>

<section class="hero hero-sm">
  <div class="hero-content">
    <h2>Regiones y cines</h2>
    <p>Encuentra los cines disponibles en tu ciudad y las películas en función.</p>
  </div>
</section>

<section>
  <div class="regiones-grid" id="regionesContainer"></div>
</section>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal-content">
    <span class="modal-close">&times;</span>
    <div id="modalBody" class="modal-body"></div>
  </div>
</div>

<footer>🎬 2026 CineNow — Tu guía de cine regional.</footer>
<script src="js/db.js"></script>
<script src="js/modal.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await DB.init();
  await actualizarNav();
  const container = document.getElementById('regionesContainer');
  const cines = DB.getCines();
  const funciones = DB.getFunciones();
  const peliculas = DB.getPeliculas();

  const regionMap = {};
  cines.forEach(c => {
    if (!regionMap[c.region]) regionMap[c.region] = [];
    regionMap[c.region].push(c);
  });

  Object.keys(regionMap).sort().forEach(region => {
    const card = document.createElement('div');
    card.className = 'region-card';
    const cinesRegion = regionMap[region];
    const listItems = cinesRegion.map(cine => {
      const pelIds = [...new Set(funciones.filter(f => Number(f.cineId) === Number(cine.id)).map(f => Number(f.peliculaId)))];
      const pelsCine = peliculas.filter(p => pelIds.includes(Number(p.id)));
      return `<li>
        <div>
          <div class="cine-name">🎭 ${cine.nombre}</div>
          <div style="color:#666;font-size:.78em;margin-top:2px">📍 ${cine.direccion || ''}</div>
        </div>
        <span class="cine-badge">${pelsCine.length} películas</span>
      </li>`;
    }).join('');

    card.innerHTML = `<h3>📍 ${region}</h3><ul class="cine-list">${listItems}</ul>`;
    container.appendChild(card);
  });
});
</script>
</body>
</html>
